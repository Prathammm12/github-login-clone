<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Trial — GitHub Style</title>
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>
<body style="background-color: black;">
  <nav class="navbar_trial" aria-label="Trial navigation">
    <div class="nav-inner">
      <div class="logo" aria-hidden="true">
        <img src="Images/GitHub-logo.png" alt="GitHub Logo" />
      </div>

      <ul class="nav-list">
        <li class="dropdown">
          <button class="dropbtn" aria-haspopup="true" aria-expanded="false">Platform ▾</button>
          <ul class="dropdown_content" role="menu" aria-hidden="true">
            <li role="none"><a role="menuitem" href="#">GitHub Copilot</a></li>
            <li role="none"><a role="menuitem" href="#">GitHub Spark</a></li>
            <li role="none"><a role="menuitem" href="#">GitHub Model</a></li>
            <li role="none"><a role="menuitem" href="#">Actions</a></li>
          </ul>
        </li>

        <li class="dropdown">
          <button class="dropbtn" aria-haspopup="true" aria-expanded="false">Sources ▾</button>
          <ul class="dropdown_content" role="menu" aria-hidden="true">
            <li role="none"><a role="menuitem" href="#">Docs</a></li>
            <li role="none"><a role="menuitem" href="#">Guides</a></li>
          </ul>
        </li>

        <li class="dropdown">
          <button class="dropbtn" aria-haspopup="true" aria-expanded="false">Open Source ▾</button>
          <ul class="dropdown_content" role="menu" aria-hidden="true">
            <li role="none"><a role="menuitem" href="#">Explore</a></li>
            <li role="none"><a role="menuitem" href="#">Community</a></li>
          </ul>
        </li>

        <li class="dropdown">
          <button class="dropbtn" aria-haspopup="true" aria-expanded="false">Enterprise ▾</button>
          <ul class="dropdown_content" role="menu" aria-hidden="true">
            <li role="none"><a role="menuitem" href="#">Solutions</a></li>
            <li role="none"><a role="menuitem" href="#">Pricing</a></li>
          </ul>
        </li>

        <li class="search_container">
          <input class="search_bar" type="text" placeholder="Search..." aria-label="Search" />
        </li>

        <li><button class="login_button" type="button">Sign in</button></li>
        <li><button class="signup_button" type="button">Sign up</button></li>
      </ul>
    </div>
  </nav>
</body>
</html>
